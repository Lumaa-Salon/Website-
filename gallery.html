<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Lumaa Salon</title>
  <meta name="description" content="Step inside Lumaa Salon — our styling floor, wash lounge, product bar, grooming studio and relaxation spaces." />
  <link rel="icon" type="image/webp" href="images/lumaa-logo-white.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Playfair+Display:ital,wght@0,600;1,700&family=Jost:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #EED9BF;
      --sage:  #9CA175;
      --offwhite: #F6F2EB;
      --earth: #937B67;
      --deep:  #2E3326;
      --ink:   #2B2922;
      --white: #FFFFFF;
      --cream-rgb: 238, 217, 191;
      --sage-rgb:  156, 161, 117;
      --earth-rgb: 147, 123, 103;
      --deep-rgb:  46, 51, 38;
      --ink-rgb:   43, 41, 34;
      --serif:   'Playfair Display', serif;
      --display: 'Cormorant Garamond', serif;
      --sans:    'Jost', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--offwhite); color: var(--ink); -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    /* ── NAVBAR (solid, light) ── */
    .navbar {
      position: fixed; inset: 0 0 auto 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 40px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(var(--ink-rgb), 0.08);
    }
    .brand { display: inline-flex; align-items: center; }
    .logo { height: 42px; width: auto; }
    .nav-links { display: flex; gap: 34px; }
    .nav-links a {
      color: var(--ink); font-size: 0.8rem; letter-spacing: 0.18em;
      text-transform: uppercase; font-weight: 400;
      position: relative; padding: 4px 0; transition: color 0.2s ease;
    }
    .nav-links a::after {
      content: ''; position: absolute; left: 0; bottom: -2px;
      width: 0; height: 1px; background: var(--sage);
      transition: width 0.3s ease;
    }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .nav-links a:hover, .nav-links a.active { color: var(--sage); }
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: 0; cursor: pointer; padding: 6px;
    }
    .hamburger span { width: 24px; height: 2px; background: var(--ink); transition: transform 0.3s ease, opacity 0.3s ease; }
    .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── SLIM INTRO ── */
    .gallery-hero { text-align: center; padding: 100px 24px 6px; }
    .gallery-hero .eyebrow {
      font-family: var(--sans); text-transform: uppercase;
      letter-spacing: 0.34em; font-size: 0.7rem; font-weight: 600;
      color: var(--earth); margin-bottom: 14px;
    }
    .gallery-hero h1 {
      font-family: var(--serif); font-weight: 600;
      font-size: clamp(2.1rem, 5vw, 3.4rem);
      color: var(--ink); letter-spacing: -0.01em; line-height: 1.05;
    }
    .gallery-hero h1 em { font-style: italic; color: var(--earth); }
    .gallery-hero .rule { width: 46px; height: 2px; background: var(--sage); margin: 14px auto 0; opacity: 0.85; }
    .gallery-hero .sub { margin: 18px auto 0; max-width: 540px; font-size: 0.98rem; line-height: 1.7; color: var(--earth); }

    /* ── PHOTO GRID ── */
    .gallery-wrap { padding: 46px 40px 96px; }
    .gallery-inner { max-width: 1200px; margin: 0 auto; }
    .pg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }

    .pg-item {
      position: relative;
      aspect-ratio: 2 / 3;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      background: #e9e3d9;
      box-shadow: 0 10px 26px rgba(var(--deep-rgb), 0.10);
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .pg-item:hover { transform: translateY(-6px); box-shadow: 0 22px 48px rgba(var(--deep-rgb), 0.24); }
    .pg-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1); }
    .pg-item:hover img { transform: scale(1.06); }
    .pg-scrim {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(var(--deep-rgb), 0.74) 0%, rgba(var(--deep-rgb), 0.14) 42%, rgba(var(--deep-rgb), 0) 66%);
      opacity: 0; transition: opacity 0.45s ease; pointer-events: none;
    }
    .pg-item:hover .pg-scrim { opacity: 1; }
    .pg-cap {
      position: absolute; left: 20px; right: 20px; bottom: 18px; z-index: 2;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.45s ease, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }
    .pg-item:hover .pg-cap { opacity: 1; transform: none; }
    .pg-eyebrow { display: block; font-size: 0.62rem; letter-spacing: 0.26em; text-transform: uppercase; color: var(--cream); margin-bottom: 6px; }
    .pg-title { display: block; font-family: var(--serif); font-size: 1.18rem; color: var(--white); line-height: 1.2; }
    .pg-title::after { content: ''; display: block; width: 0; height: 2px; background: var(--sage); margin-top: 8px; transition: width 0.5s ease 0.05s; }
    .pg-item:hover .pg-title::after { width: 40px; }

    /* scroll-reveal */
    .reveal { opacity: 0; transform: translateY(34px); will-change: opacity, transform; transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.22, 1, 0.36, 1); }
    .reveal.is-visible { opacity: 1; transform: none; }

    .back-home { text-align: center; margin-top: 54px; }
    .back-home a {
      font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--earth); font-weight: 600; border-bottom: 1px solid rgba(var(--earth-rgb), 0.4);
      padding-bottom: 3px; transition: color 0.2s ease, border-color 0.2s ease;
    }
    .back-home a:hover { color: var(--sage); border-color: var(--sage); }

    /* ── LIGHTBOX ── */
    .lb {
      position: fixed; inset: 0; z-index: 100;
      display: none; align-items: center; justify-content: center;
      background: rgba(22, 24, 18, 0.93);
      -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
      opacity: 0; transition: opacity 0.3s ease;
    }
    .lb.open { display: flex; opacity: 1; }
    .lb-stage { position: relative; max-width: 90vw; max-height: 84vh; display: flex; flex-direction: column; align-items: center; }
    .lb-img {
      max-width: 90vw; max-height: 78vh; width: auto; height: auto;
      border-radius: 10px; box-shadow: 0 24px 70px rgba(0,0,0,0.55);
      animation: lb-pop 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes lb-pop { from { opacity: 0; transform: scale(0.965); } to { opacity: 1; transform: none; } }
    .lb-cap { margin-top: 16px; text-align: center; color: var(--white); }
    .lb-cap .pg-eyebrow { color: var(--cream); }
    .lb-cap .lb-title { font-family: var(--serif); font-size: 1.25rem; }
    .lb-count { margin-top: 4px; font-size: 0.74rem; letter-spacing: 0.14em; color: rgba(255,255,255,0.6); }
    .lb-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25);
      color: var(--white); font-size: 1.5rem; line-height: 1; cursor: pointer;
      display: grid; place-items: center;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .lb-btn:hover { background: var(--sage); }
    .lb-prev { left: -70px; }
    .lb-next { right: -70px; }
    .lb-close {
      position: absolute; top: 22px; right: 26px;
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25);
      color: var(--white); font-size: 1.5rem; cursor: pointer;
      display: grid; place-items: center; transition: background 0.2s ease;
    }
    .lb-close:hover { background: var(--sage); }

    /* touch / no-hover: show captions by default */
    @media (hover: none) {
      .pg-scrim { opacity: 1; }
      .pg-cap { opacity: 1; transform: none; }
      .pg-title::after { width: 40px; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 980px) {
      .navbar { padding: 12px 24px; }
      .gallery-wrap { padding: 40px 26px 84px; }
      .pg-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
      .lb-prev { left: 8px; } .lb-next { right: 8px; }
    }
    @media (max-width: 640px) {
      .navbar { padding: 12px 16px; }
      .nav-links { display: none; flex-direction: column; gap: 0;
        position: absolute; top: 100%; left: 0; right: 0;
        background: #fff; box-shadow: 0 8px 24px rgba(43,41,34,0.1);
        max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
      .nav-links.open { display: flex; max-height: 360px; }
      .nav-links a { padding: 15px 24px; border-top: 1px solid rgba(43,41,34,0.07); }
      .hamburger { display: flex; }
      .gallery-hero { padding: 78px 16px 4px; }
      .gallery-wrap { padding: 32px 16px 68px; }
      .pg-grid { gap: 10px; }
      .lb-close { top: 14px; right: 14px; }
      .lb-btn { width: 42px; height: 42px; }
    }
  </style>
</head>
<body>

  <!-- ── NAVBAR ── -->
  <header class="navbar" id="navbar">
    <a href="index.html" class="brand">
      <img src="images/lumaa-logo-olive.webp" alt="Lumaa Salon" class="logo" />
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html#services">Services</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="index.html#reviews">Reviews</a>
      <a href="index.html#contact">Contact</a>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLScYBFybON-J7nFKHJC2IQqXxigCQ_ar4FxfF-Mzsk_BcsSYzg/viewform" target="_blank" rel="noopener">Franchise</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- ── SLIM INTRO ── -->
  <section class="gallery-hero">
    <h1>The <em>Gallery</em></h1>
    <span class="rule"></span>
    <p class="sub">A closer look inside Lumaa Salon — every corner designed for comfort, craft and a little bit of glow.</p>
  </section>

  <!-- ── PHOTO GRID ── -->
  <section class="gallery-wrap">
    <div class="gallery-inner">
      <div class="pg-grid" id="pgGrid">
        <figure class="pg-item reveal" data-src="images/gallery-styling-suite.jpg" data-eyebrow="Glam" data-title="Styling Suite">
          <img src="images/gallery-styling-suite.jpg" alt="Styling suite" loading="lazy" />
          <span class="pg-scrim"></span>
          <figcaption class="pg-cap"><span class="pg-eyebrow">Glam</span><span class="pg-title">Styling Suite</span></figcaption>
        </figure>
        <figure class="pg-item reveal" data-src="images/gallery-mens-grooming.jpg" data-eyebrow="In Session" data-title="Men's Grooming">
          <img src="images/gallery-mens-grooming.jpg" alt="Men's grooming in session" loading="lazy" />
          <span class="pg-scrim"></span>
          <figcaption class="pg-cap"><span class="pg-eyebrow">In Session</span><span class="pg-title">Men's Grooming</span></figcaption>
        </figure>
        <figure class="pg-item reveal" data-src="images/gallery-hair-spa.jpg" data-eyebrow="Relax" data-title="Hair Spa">
          <img src="images/gallery-hair-spa.jpg" alt="Hair spa" loading="lazy" />
          <span class="pg-scrim"></span>
          <figcaption class="pg-cap"><span class="pg-eyebrow">Relax</span><span class="pg-title">Hair Spa</span></figcaption>
        </figure>
        <figure class="pg-item reveal" data-src="images/gallery-product-bar.jpg" data-eyebrow="Curated" data-title="The Product Bar">
          <img src="images/gallery-product-bar.jpg" alt="The product bar" loading="lazy" />
          <span class="pg-scrim"></span>
          <figcaption class="pg-cap"><span class="pg-eyebrow">Curated</span><span class="pg-title">The Product Bar</span></figcaption>
        </figure>
        <figure class="pg-item reveal" data-src="images/gallery-vanity-station.jpg" data-eyebrow="Bright" data-title="Vanity Station">
          <img src="images/gallery-vanity-station.jpg" alt="Vanity station" loading="lazy" />
          <span class="pg-scrim"></span>
          <figcaption class="pg-cap"><span class="pg-eyebrow">Bright</span><span class="pg-title">Vanity Station</span></figcaption>
        </figure>
        <figure class="pg-item reveal" data-src="images/gallery-mirror-wall.jpg" data-eyebrow="Editorial" data-title="The Mirror Row">
          <img src="images/gallery-mirror-wall.jpg" alt="The mirror row" loading="lazy" />
          <span class="pg-scrim"></span>
          <figcaption class="pg-cap"><span class="pg-eyebrow">Editorial</span><span class="pg-title">The Mirror Row</span></figcaption>
        </figure>
      </div>

      <div class="back-home">
        <a href="index.html#gallery">&#8592; Back to Home</a>
      </div>
    </div>
  </section>

  <!-- ── LIGHTBOX ── -->
  <div class="lb" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
    <button class="lb-btn lb-prev" id="lbPrev" aria-label="Previous photo">&#8249;</button>
    <div class="lb-stage">
      <img class="lb-img" id="lbImg" src="" alt="" />
      <div class="lb-cap">
        <span class="pg-eyebrow" id="lbEyebrow"></span>
        <span class="lb-title" id="lbTitle"></span>
        <p class="lb-count" id="lbCount"></p>
      </div>
    </div>
    <button class="lb-btn lb-next" id="lbNext" aria-label="Next photo">&#8250;</button>
  </div>

  <!-- ── FOOTER ── -->
  <footer class="reviews-footer" style="background: var(--sage); border-top: 1px solid rgba(var(--ink-rgb), 0.18); text-align: center; padding: 24px 40px; font-size: 0.76rem; color: rgba(var(--ink-rgb), 0.65); letter-spacing: 0.06em;">
    <p>&copy; 2026 Lumaa Salon &nbsp;&middot;&nbsp; <a href="index.html#contact" style="color: var(--ink); font-weight: 600;">Contact Us</a> &nbsp;&middot;&nbsp; <a href="index.html" style="color: var(--ink); font-weight: 600;">Back to Home</a></p>
  </footer>

  <script>
    /* Hamburger menu */
    (function () {
      var hamburger = document.getElementById('hamburger');
      var navLinks  = document.getElementById('navLinks');
      if (hamburger && navLinks) {
        hamburger.addEventListener('click', function () {
          navLinks.classList.toggle('open');
          hamburger.classList.toggle('active');
        });
      }
    })();

    /* Scroll-reveal — staggered fade/slide-up as tiles enter the viewport */
    (function () {
      var items = document.querySelectorAll('.pg-item.reveal');
      if (!('IntersectionObserver' in window)) {
        items.forEach(function (el) { el.classList.add('is-visible'); });
        return;
      }
      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            var el = entry.target;
            // stagger within each row of 3
            var i = Array.prototype.indexOf.call(items, el);
            el.style.transitionDelay = (0.06 * (i % 3)) + 's';
            el.classList.add('is-visible');
            obs.unobserve(el);
          }
        });
      }, { threshold: 0.12 });
      items.forEach(function (el) { obs.observe(el); });
    })();

    /* Lightbox — click a photo to view it large, with prev/next + keyboard */
    (function () {
      var figs = Array.prototype.slice.call(document.querySelectorAll('.pg-item'));
      var lb    = document.getElementById('lightbox');
      var img   = document.getElementById('lbImg');
      var eyeb  = document.getElementById('lbEyebrow');
      var title = document.getElementById('lbTitle');
      var count = document.getElementById('lbCount');
      var idx = 0;

      function show(i) {
        idx = (i + figs.length) % figs.length;
        var f = figs[idx];
        img.src = f.getAttribute('data-src');
        img.alt = f.getAttribute('data-title') || '';
        eyeb.textContent  = f.getAttribute('data-eyebrow') || '';
        title.textContent = f.getAttribute('data-title') || '';
        count.textContent = (idx + 1) + ' / ' + figs.length;
        // restart pop animation
        img.style.animation = 'none';
        // eslint-disable-next-line no-unused-expressions
        img.offsetHeight;
        img.style.animation = '';
      }
      function open(i) { show(i); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
      function close() { lb.classList.remove('open'); document.body.style.overflow = ''; }

      figs.forEach(function (f, i) {
        f.addEventListener('click', function () { open(i); });
      });
      document.getElementById('lbClose').addEventListener('click', close);
      document.getElementById('lbPrev').addEventListener('click', function (e) { e.stopPropagation(); show(idx - 1); });
      document.getElementById('lbNext').addEventListener('click', function (e) { e.stopPropagation(); show(idx + 1); });
      lb.addEventListener('click', function (e) { if (e.target === lb || e.target.classList.contains('lb-stage')) close(); });
      document.addEventListener('keydown', function (e) {
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape') close();
        else if (e.key === 'ArrowLeft') show(idx - 1);
        else if (e.key === 'ArrowRight') show(idx + 1);
      });
    })();
  </script>

</body>
</html>
